services:
  newsfeed:
    build: .
    image: newsfeed:latest
    container_name: newsfeed
    restart: unless-stopped
    ports:
      - "3939:3939"
    environment:
      - NODE_ENV=production
      - PORT=3939
      - HOSTNAME=0.0.0.0
    healthcheck:
      test:
        - CMD-SHELL
        - "node -e \"require('http').get('http://localhost:3939/',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
